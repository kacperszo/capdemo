name: Docs to PDF

on:
  push:
    branches:
      - main
    paths:
      - 'REPORT.md'
      - 'images/**'
  workflow_dispatch:

jobs:
  converttopdf:
    name: Build PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: baileyjm02/markdown-to-pdf@v1
        with:
          input_dir: ./
          output_dir: pdfs
          build_html: false
      - run: find . -name "*.pdf" -type f
      - uses: actions/upload-artifact@v4
        with:
          name: report-pdf
          path: ./**/*.pdf
