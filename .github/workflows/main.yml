name: Docs to PDF

on:
  push:
    branches:
      - main
    paths:
      - 'REPORT.md'
      - 'images/**'
  workflow_dispatch:

jobs:
  converttopdf:
    name: Build PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: baileyjm02/markdown-to-pdf@v1
        with:
          input_path: REPORT.md
          output_dir: pdfs
          images_dir: ./images
          image_import: ./images
          build_html: false
      - uses: actions/upload-artifact@v4
        with:
          name: report-pdf
          path: pdfs/report.pdf
